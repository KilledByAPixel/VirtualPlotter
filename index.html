<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8>
<title>Plotter3D</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
  #stage { position: fixed; inset: 0; }
  #panel { position: fixed; top: 12px; left: 12px; padding: 10px 12px;
    background: rgba(255,255,255,0.92); border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15); font-size: 13px; }
  #panel button { padding: 5px 12px; font-size: 13px; cursor: pointer; margin-right: 6px; }
  #hint { color: #555; }
#panel .row { margin-bottom: 8px; display: flex; gap: 10px; align-items: center; }
#panel label { display: flex; gap: 4px; align-items: center; color: #555; }
#layers { display: flex; flex-direction: column; gap: 4px; max-width: 330px; }
.layer-row { display: flex; align-items: center; gap: 6px; cursor: pointer; border-radius: 4px; padding: 1px 3px; }
.layer-row.sel { background: #e3ecf7; }
.layer-name { color: #333; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#setup input[type=color] { width: 18px; height: 18px; padding: 0; border: 1px solid #ccc; background: none; cursor: pointer; }
#setup select { font-size: 12px; max-width: 110px; }
.layer-row select { font-size: 11px; }
.layer-row .layer-name { flex: 1; min-width: 36px; }
.layer-row input[type=color] { width: 18px; height: 18px; padding: 0; border: 1px solid #ccc; background: none; cursor: pointer; }
.pen-ink { color: #888; font-size: 11px; margin-left: auto; }
#plotClock { color: #555; font-size: 12px; }
#panel button.fresh-btn { padding: 1px 6px; font-size: 11px; margin-right: 0; }
#recent { margin-top: 10px; display: none; }
.recent-head { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #888; margin-bottom: 4px; }
.recent-item { display: block; width: 100%; max-width: 220px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 3px 6px; margin: 2px 0; font-size: 12px; cursor: pointer; background: #f3f5f7; border: 1px solid #dde2e6; border-radius: 4px; }
.recent-item:hover { background: #e7ebef; }
body.ui-hidden #panel { display: none; }
#tip { position: fixed; background: rgba(20,22,26,0.9); color: #fff; padding: 4px 8px;
  border-radius: 4px; font-size: 11px; pointer-events: none; display: none; z-index: 10; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id=stage></div>
<div id=panel>
  <div id=hint>Drop an SVG file anywhere to load it onto the plotter</div>
  <div id=controls style="display:none">
    <div class=row>
      <button id=playBtn>▶ Plot</button>
      <button id=resetBtn>Reset</button>
      <button id=muteBtn title="Mute / unmute sound">🔊</button>
      <span id=plotClock title="Plot time"></span>
    </div>
    <div class=row>
      <label>Speed
        <select id=speedSel>
          <option value=1 selected>1×</option>
          <option value=5>5×</option>
          <option value=20>20×</option>
          <option value=100>100×</option>
          <option value=1000>1000×</option>
        </select>
      </label>
      <label>Plot
        <select id=layerSel><option value=all>All layers</option></select>
      </label>
    </div>
    <div id=layers></div>
  </div>
  <div id=setup>
    <div id=currentPen></div>
    <div class=row>
      <label>Paper
        <select id=paperTypeSel></select>
        <select id=paperSizeSel title="Paper size"></select>
        <input type=color id=paperColor title="Paper color">
      </label>
    </div>
    <label class=row style="cursor:pointer">
      <input type=checkbox id=inkSim checked> Ink simulation
    </label>
  </div>
  <div id=recent></div>
</div>
<div id=tip></div>

<script type="module">
import { createScene } from './code/scene.js';
import { extractStrokes } from './code/plotExtract.js';
import { PlotSim } from './code/sim.js';
import { createAudio } from './code/audio.js';
import { SAMPLE_SVG } from './code/sample.js';
import { PENS, PAPERS, PAPER_SIZES, DEFAULT_PEN, DEFAULT_PAPER, DEFAULT_SIZE } from './code/inventory.js';
import { PenSim, createRng } from './code/penSim.js';

const scene = createScene(document.getElementById('stage'));
const sim = new PlotSim();
const audio = createAudio();
const hint = document.getElementById('hint');
const controls = document.getElementById('controls');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');

let speed = 1;   // sim time multiplier (set by the Speed control)
let loaded = false;
let lastArt = null;   // {w, h} of the loaded artwork, for re-fitting on paper resize

// Pen position is tracked here so the animation loop can derive per-axis speed
// for the motor sounds; a pen up/down change triggers the servo blip.
let penX = 0, penY = 0, penDownPrev = false;
audio.setEnabled(speed === 1);   // sound only plays at realtime (1x)

// --- pens & paper ---------------------------------------------------------
// Pen ink levels (and ink-color overrides) persist across sessions: your
// half-dead Marker is still half-dead tomorrow. PenSim instances are the
// live source of truth; penState mirrors them for storage.
const PEN_KEY = 'plotter3d.pens';
const PAPER_KEY = 'plotter3d.paper';
try { localStorage.removeItem('plotter3d.penWidth'); } catch {}   // leftover key from a removed feature
const penDef = (id) => PENS.find(p => p.id === id) || PENS[0];

let penState = {};
try { penState = JSON.parse(localStorage.getItem(PEN_KEY)) || {}; } catch {}
if (typeof penState !== 'object' || !penState || Array.isArray(penState)) penState = {};
for (const p of PENS) penState[p.id] = { ink: 1, ...penState[p.id] };
const TIP_SIZES = [0.3, 0.5, 0.7, 1.0, 1.5, 2.0];
for (const p of PENS)
  if ('tip' in penState[p.id] && !TIP_SIZES.includes(penState[p.id].tip))
    delete penState[p.id].tip;   // corrupt/legacy override: fall back to default
function persistPens() {
  try { localStorage.setItem(PEN_KEY, JSON.stringify(penState)); } catch {}
}
const penColor = (id) => penState[id].color || penDef(id).color;

// Last selected pen + ink-simulation flag persist separately from pen state.
const SETTINGS_KEY = 'plotter3d.settings';
let settings = { inkSim: true, penId: DEFAULT_PEN };
try { settings = { ...settings, ...(JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}) }; } catch {}
delete settings.unlimitedInk;   // pre-release flag, superseded by inkSim
if (!PENS.some(p => p.id === settings.penId)) settings.penId = DEFAULT_PEN;
function persistSettings() {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch {}
}

const penTip = (id) => penState[id].tip || penDef(id).tip;

// Effective defs: inventory def + user overrides, held in ONE mutable object
// per pen that its PenSim shares — editing tip mid-session applies instantly.
const effDefs = {};
function effDef(id) {
  if (!effDefs[id]) effDefs[id] = { ...penDef(id) };
  applyTip(effDefs[id], id);
  return effDefs[id];
}
function applyTip(eff, id) {
  const def = penDef(id), t = penTip(id);
  eff.tip = t;
  if (def.tipMin) {           // brush swell scales around the chosen tip
    eff.tipMin = def.tipMin * (t / def.tip);
    eff.tipMax = def.tipMax * (t / def.tip);
  }
}

const penSims = {};
function penSimFor(id) {
  if (!penSims[id]) penSims[id] = new PenSim(effDef(id),
    { ink: penState[id].ink, rng: createRng(1234), realistic: settings.inkSim });
  return penSims[id];
}
function syncPen(id) {
  if (!penSims[id]) return;
  penState[id].ink = penSims[id].ink;
  persistPens();
  scene.setPenLevel(id, penState[id].ink);
}
function refreshCarriage() {   // mirror the active pen's current look
  if (activePenId) scene.setCarriagePen(effDef(activePenId), penColor(activePenId));
}

let paperSel = { id: DEFAULT_PAPER, color: null, size: DEFAULT_SIZE };
try { paperSel = { ...paperSel, ...(JSON.parse(localStorage.getItem(PAPER_KEY)) || {}) }; } catch {}
if (!PAPER_SIZES.some(s => s.id === paperSel.size)) paperSel.size = DEFAULT_SIZE;
const paperDef = () => PAPERS.find(p => p.id === paperSel.id) || PAPERS[0];
const sizeDef = () => PAPER_SIZES.find(s => s.id === paperSel.size) || PAPER_SIZES[0];
function applyPaper() {
  const d = paperDef();
  scene.setPaper({ color: paperSel.color || d.color, grain: d.grain, bleed: d.bleed });
  try { localStorage.setItem(PAPER_KEY, JSON.stringify(paperSel)); } catch {}
}
applyPaper();
function applyPaperSize() {
  const s = sizeDef();
  scene.setPaperSize(s.w, s.h);
  // the rig rebuild forgets the ink gauges and any loaded artwork fit
  PENS.forEach(p => scene.setPenLevel(p.id, penState[p.id].ink));
  if (lastArt) scene.loadArtwork(lastArt.w, lastArt.h);
}
if (paperSel.size !== DEFAULT_SIZE) {
  const s = sizeDef();
  scene.setPaperSize(s.w, s.h);
}

scene.buildInventory(PENS, PAPERS);
scene.setPaperSelected(paperSel.id);
PENS.forEach(p => scene.setPenLevel(p.id, penState[p.id].ink));

const tip = document.getElementById('tip');
scene.onHover((u, x, y) => {
  if (!u) { tip.style.display = 'none'; return; }
  tip.style.display = '';
  tip.style.left = (x + 14) + 'px';
  tip.style.top = (y + 10) + 'px';
  tip.textContent = u.type === 'pen'
    ? `${penDef(u.id).name} · ${penTip(u.id)}mm · ink ${Math.round(penSimFor(u.id).ink * 100)}%`
    : PAPERS.find(p => p.id === u.id).name;
});
scene.onPick((u) => {
  if (u.type === 'pen') {
    if (!penLocked()) selectPen(u.id);
  } else if (!paperLocked()) {
    paperSel = { ...paperSel, id: u.id, color: null };
    scene.setPaperSelected(u.id); applyPaper(); refreshPanel();
  }
});

// Initial layer assignment: the pen whose ink is nearest the SVG layer color,
// so a red Inkscape layer picks up the red fineliner automatically.
function closestPen(hex) {
  const v = parseInt((hex || '#000000').slice(1), 16);
  const r = v >> 16 & 255, g = v >> 8 & 255, b = v & 255;
  let best = DEFAULT_PEN, bd = Infinity;
  for (const p of PENS) {
    const w = parseInt(penColor(p.id).slice(1), 16);
    const d = (r - (w >> 16 & 255)) ** 2 + (g - (w >> 8 & 255)) ** 2 + (b - (w & 255)) ** 2;
    if (d < bd) { bd = d; best = p.id; }
  }
  return best;
}

let layerPens = [];          // pen id per layer index
let activePenId = null;      // pen currently in the machine
let pendingSwap = null;      // {def, col} set by onLayer, consumed by the rAF loop
let plotActive = false;      // true from Plot start until reset/complete/new-load/filter-change
let swapping = false;        // true while a physical pen-swap animation is in flight
// Pens unlock whenever the machine isn't actually moving — pausing a plot is
// exactly when you swap pens, like a real plotter. Paper stays locked for the
// whole plot (even paused): you can't slide a new sheet under half a drawing.
const penLocked = () => sim.running || swapping;
const paperLocked = () => plotActive || swapping;
let currentLayer = null;     // layer index being plotted (for pause pen swaps)

function assignPen(layerIdx, penId) {
  if (penLocked() || !sim.layerInfo?.[layerIdx]) return;
  layerPens[layerIdx] = penId;
  sim.layerInfo[layerIdx].color = penColor(penId);  // sim's color follows the pen
  // Reassigning the layer being plotted (possible while paused) swaps the
  // machine's pen right away, so resuming continues with the new pen.
  if (layerIdx === currentLayer && activePenId && penId !== activePenId) {
    syncPen(activePenId);
    scene.setPenInCaddy(activePenId, true);
    activePenId = penId;
    scene.setPenInCaddy(penId, false);
    refreshCarriage();
  }
  buildLayerUI._refresh?.();
}

sim.onPose = (x, y, down) => {
  scene.setPenPose(x, y, down);
  penX = x; penY = y;
  if (down !== penDownPrev) {
    penDownPrev = down;
    const ps = activePenId && penSimFor(activePenId);
    if (ps) down ? ps.penDown() : ps.penUp();
    audio.penMove(down);
  }
};
sim.onLayer = (i) => {
  currentLayer = i;
  const id = layerPens[i] ?? DEFAULT_PEN;
  if (id === activePenId) return;
  const prev = activePenId;
  if (prev) { syncPen(prev); scene.setPenInCaddy(prev, true); }
  activePenId = id;
  scene.setPenInCaddy(id, false);              // it's in the machine now
  const def = effDef(id), col = penColor(id);
  if (speed === 1 && sim.running && prev) {
    pendingSwap = { def, col };
    sim.pause();
    audio.penMove(false);                      // servo blip sells the swap
  } else {
    scene.setCarriagePen(def, col);
  }
};
sim.onInk = (ax, ay, bx, by) => {
  const id = activePenId ?? DEFAULT_PEN;
  const def = effDef(id);
  for (const op of penSimFor(id).segment(ax, ay, bx, by))
    scene.drawOp({ ...op, color: penColor(id), sheen: def.sheen });
};
sim.onComplete = () => {
  plotActive = false;
  playBtn.textContent = '▶ Plot';
  updateControlLocks();
  if (activePenId) syncPen(activePenId);
  if (activePenId) { scene.setPenInCaddy(activePenId, true); activePenId = null; }
  currentLayer = null;
  refreshPanel();
};

function loadSvgText(text, name) {
  let data;
  try { data = extractStrokes(text); }
  catch (e) { hint.textContent = 'Could not parse that SVG.'; hint.style.display = ''; return; }
  if (!data.strokes.length) { hint.textContent = 'No strokes found in that SVG.'; hint.style.display = ''; return; }
  lastArt = { w: data.widthMm, h: data.heightMm };
  scene.loadArtwork(data.widthMm, data.heightMm);
  sim.load(data.strokes, data.strokeLayers, data.layerInfo,
           { downSpeed: 60, upSpeed: 200, liftMs: 240 });
  layerPens = data.layerInfo.length === 1
    ? [selectedPenId]
    : data.layerInfo.map(l => closestPen(l.color));
  data.layerInfo.forEach((l, i) => { l.color = penColor(layerPens[i]); });
  scene.cancelSwap();
  swapping = false;
  plotActive = false;
  updateControlLocks();
  if (activePenId) { syncPen(activePenId); scene.setPenInCaddy(activePenId, true); }
  activePenId = null;
  currentLayer = null;
  loaded = true;
  plotMs = 0;
  updateClock();
  hint.style.display = 'none';
  controls.style.display = '';
  playBtn.textContent = '▶ Plot';
  layerSel.value = 'all';
  sim.setLayerFilter(null);
  buildLayerUI(data);
  saveRecent(name, text);
}

// --- recently plotted files ---
// `recentList` is the in-memory source of truth so the list always renders this
// session even if localStorage is unavailable (e.g. some file:// setups) or a
// write fails; localStorage is just best-effort persistence across reloads.
const RECENT_KEY = 'plotter3d.recent';
const MAX_RECENT = 8;
const recentDiv = document.getElementById('recent');

function readStored() {
  try { const v = JSON.parse(localStorage.getItem(RECENT_KEY)); return Array.isArray(v) ? v : []; }
  catch { return []; }
}
let recentList = readStored();
// First visit (nothing stored yet): seed the list with a built-in sample so
// there's something to click. Loading it persists it like any dropped file.
if (!recentList.length) recentList = [{ name: 'sample.svg', svg: SAMPLE_SVG, t: 0 }];

function persistRecent() {
  let l = recentList.slice();
  while (l.length) {
    try { localStorage.setItem(RECENT_KEY, JSON.stringify(l)); return; }
    catch { l.pop(); }            // quota/blocked: shrink and retry
  }
  try { localStorage.removeItem(RECENT_KEY); } catch {}
}

function saveRecent(name, svg) {
  if (!svg) return;
  const n = name || 'untitled.svg';
  recentList = [{ name: n, svg, t: Date.now() },
                ...recentList.filter(it => it.name !== n)].slice(0, MAX_RECENT);
  persistRecent();                 // best-effort; UI renders from recentList
  buildRecentUI();
}

function buildRecentUI() {
  recentDiv.innerHTML = '';
  if (!recentList.length) { recentDiv.style.display = 'none'; return; }
  recentDiv.style.display = 'block';
  const head = document.createElement('div');
  head.className = 'recent-head';
  head.textContent = 'Recent';
  recentDiv.appendChild(head);
  recentList.forEach(it => {
    const b = document.createElement('button');
    b.className = 'recent-item';
    b.textContent = it.name;
    b.title = it.name;
    b.addEventListener('click', () => loadSvgText(it.svg, it.name));
    recentDiv.appendChild(b);
  });
}
buildRecentUI();

// Press F to toggle a free-fly camera (documented in the README; no on-screen
// hint — the view stays clean). H hides/shows all the UI.
let uiHidden = false;
addEventListener('keydown', e => {
  const tag = e.target && e.target.tagName;   // don't hijack keys while a control is focused
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  const k = e.key.toLowerCase();
  if (k === 'f') { e.preventDefault(); scene.toggleFreeCam(); }
  else if (k === 'h') {
    e.preventDefault();
    uiHidden = !uiHidden;
    document.body.classList.toggle('ui-hidden', uiHidden);
  }
});

addEventListener('dragover', e => e.preventDefault());
addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = () => loadSvgText(r.result, file.name);
  r.readAsText(file);
});

playBtn.addEventListener('click', () => {
  if (!loaded || swapping) return;
  if (sim.running) {
    sim.pause();
    playBtn.textContent = '▶ Plot';
    if (activePenId) syncPen(activePenId);
    updateControlLocks();        // paused: pens unlock, paper stays locked
    refreshPanel();
  }
  else {
    if (sim.isComplete()) { sim.reset(); scene.resetInk(); plotMs = 0; }
    plotActive = true;
    sim.start();
    audio.resume();              // user gesture — unlock Web Audio
    playBtn.textContent = '❚❚ Pause';
    updateControlLocks();        // running: everything locks
  }
});
resetBtn.addEventListener('click', () => {
  scene.cancelSwap();
  swapping = false;
  plotActive = false;
  plotMs = 0;
  updateClock();
  sim.reset();
  scene.resetInk();
  playBtn.textContent = '▶ Plot';
  updateControlLocks();
  if (activePenId) { scene.setPenInCaddy(activePenId, true); activePenId = null; }
  currentLayer = null;
  refreshPanel();
});

// Sound on/off toggle (persisted). This is independent of the realtime gate,
// so audio still only plays at 1x AND when un-muted.
const muteBtn = document.getElementById('muteBtn');
let muted = false;
try { muted = localStorage.getItem('plotter3d.muted') === '1'; } catch {}
function applyMute() {
  audio.setMuted(muted);
  muteBtn.textContent = muted ? '🔇' : '🔊';
}
applyMute();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  try { localStorage.setItem('plotter3d.muted', muted ? '1' : '0'); } catch {}
  applyMute();
});

// Plot clock: SIMULATED plot time — it advances by dt * speed, so at 100×
// it runs 100× faster and always approximates how long the plot would take
// on a real machine at 1×. Pause freezes it; completion leaves the total.
const plotClock = document.getElementById('plotClock');
let plotMs = 0;
function updateClock() {
  const s = Math.floor(plotMs / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor(s / 60) % 60;
  plotClock.textContent = (h ? h + ':' + String(m).padStart(2, '0') : m)
    + ':' + String(s % 60).padStart(2, '0');
}
updateClock();

const speedSel = document.getElementById('speedSel');
const layerSel = document.getElementById('layerSel');
const layersDiv = document.getElementById('layers');

let selectedLayer = 0;
let selectedPenId = settings.penId;      // always a valid pen from startup
const paperColor = document.getElementById('paperColor');
const paperTypeSel = document.getElementById('paperTypeSel');
const inkSimBox = document.getElementById('inkSim');

// Pen types for the per-layer selector: one entry per distinct style,
// labeled by that style's pen name (Fineliner, Marker, ...).
const PEN_STYLES = [];
for (const p of PENS)
  if (!PEN_STYLES.some(s => s.style === p.style))
    PEN_STYLES.push({ style: p.style, label: p.name });

const colorDist = (hexA, hexB) => {
  const a = parseInt(hexA.slice(1), 16), b = parseInt(hexB.slice(1), 16);
  return ((a >> 16 & 255) - (b >> 16 & 255)) ** 2
       + ((a >> 8 & 255) - (b >> 8 & 255)) ** 2
       + ((a & 255) - (b & 255)) ** 2;
};
// The pen of a given style whose ink is nearest the wanted color — so
// switching a layer's pen type keeps its color intent.
function closestPenOfStyle(style, hex) {
  let best = null, bd = Infinity;
  for (const p of PENS) {
    if (p.style !== style) continue;
    const d = colorDist(hex, penColor(p.id));
    if (d < bd) { bd = d; best = p.id; }
  }
  return best || DEFAULT_PEN;
}

PAPERS.forEach(p => {
  const o = document.createElement('option');
  o.value = p.id; o.textContent = p.name;
  paperTypeSel.appendChild(o);
});
const paperSizeSel = document.getElementById('paperSizeSel');
PAPER_SIZES.forEach(s => {
  const o = document.createElement('option');
  o.value = s.id; o.textContent = s.name;
  paperSizeSel.appendChild(o);
});
inkSimBox.checked = settings.inkSim;

// Before an SVG loads there are no layer rows, so a single "current pen" row
// shows the selected pen (caddy clicks land here); it hides once layers exist.
const currentPenDiv = document.getElementById('currentPen');
const cp = (() => {
  const row = document.createElement('div');
  row.className = 'layer-row sel';
  const sw = document.createElement('input');
  sw.type = 'color'; sw.title = 'Ink color';
  const name = document.createElement('span');
  name.className = 'layer-name';
  name.textContent = 'Pen';
  const typeSel = document.createElement('select');
  typeSel.title = 'Pen type';
  for (const s of PEN_STYLES) {
    const o = document.createElement('option');
    o.value = s.style; o.textContent = s.label;
    typeSel.appendChild(o);
  }
  const tipSel = document.createElement('select');
  tipSel.title = 'Tip size (mm)';
  for (const t of TIP_SIZES) {
    const o = document.createElement('option');
    o.value = String(t); o.textContent = t.toFixed(1);
    tipSel.appendChild(o);
  }
  const ink = document.createElement('span');
  ink.className = 'pen-ink';
  const fresh = document.createElement('button');
  fresh.className = 'fresh-btn';
  fresh.textContent = 'Fresh';
  fresh.title = 'Swap in a fresh pen';
  row.append(sw, name, typeSel, tipSel, ink, fresh);
  currentPenDiv.appendChild(row);

  sw.addEventListener('input', () => {
    if (penLocked()) return;
    penState[selectedPenId].color = sw.value;
    persistPens();
    refreshPanel();
  });
  typeSel.addEventListener('change', () => {
    if (penLocked()) { refreshPanel(); return; }
    selectPen(closestPenOfStyle(typeSel.value, penColor(selectedPenId)));
  });
  tipSel.addEventListener('change', () => {
    if (penLocked()) { refreshPanel(); return; }
    const t = parseFloat(tipSel.value);
    if (t === penDef(selectedPenId).tip) delete penState[selectedPenId].tip;
    else penState[selectedPenId].tip = t;
    persistPens();
    applyTip(effDef(selectedPenId), selectedPenId);
    refreshPanel();
  });
  fresh.addEventListener('click', () => {
    if (penLocked() || !settings.inkSim) return;
    penSimFor(selectedPenId).refill();
    syncPen(selectedPenId);
    refreshPanel();
  });
  return { sw, typeSel, tipSel, ink, fresh };
})();

function updateControlLocks() {   // derived from penLocked/paperLocked state
  const pen = penLocked(), paper = paperLocked();
  paperTypeSel.disabled = paperSizeSel.disabled = paperColor.disabled = paper;
  cp.sw.disabled = cp.typeSel.disabled = cp.tipSel.disabled = pen;
  cp.fresh.disabled = pen || !settings.inkSim;
  for (const r of layerRows) {
    r.sw.disabled = r.typeSel.disabled = r.tipSel.disabled = pen;
    // Fresh also grays out when ink simulation is off — it does nothing then.
    r.fresh.disabled = pen || !settings.inkSim;
  }
}

function selectLayer(i) {
  selectedLayer = i;
  if (layerPens[i]) { selectedPenId = layerPens[i]; onPenSelected(); }
  refreshPanel();
}

function selectPen(id) {
  selectedPenId = id;
  if (loaded && !penLocked()) assignPen(selectedLayer, id);
  onPenSelected();
  refreshPanel();
}

function onPenSelected() {
  settings.penId = selectedPenId;
  persistSettings();
  scene.setPenSelected(selectedPenId);
}

function refreshPanel() {
  layerRows.forEach((r, i) => {
    const id = layerPens[i];
    r.row.classList.toggle('sel', i === selectedLayer);
    r.sw.value = penColor(id);
    r.typeSel.value = penDef(id).style;
    r.tipSel.value = String(penTip(id));
    r.ink.textContent = Math.round(penSimFor(id).ink * 100) + '%';
    r.fresh.disabled = penLocked() || !settings.inkSim;
  });
  currentPenDiv.style.display = loaded ? 'none' : '';
  if (!loaded) {
    cp.sw.value = penColor(selectedPenId);
    cp.typeSel.value = penDef(selectedPenId).style;
    cp.tipSel.value = String(penTip(selectedPenId));
    cp.ink.textContent = Math.round(penSimFor(selectedPenId).ink * 100) + '%';
    cp.fresh.disabled = penLocked() || !settings.inkSim;
  }
  paperTypeSel.value = paperSel.id;
  paperSizeSel.value = paperSel.size;
  paperColor.value = paperSel.color || paperDef().color;
}
buildLayerUI._refresh = refreshPanel;

speedSel.addEventListener('change', () => {
  speed = +speedSel.value;
  audio.setEnabled(speed === 1);   // mute above realtime
});

layerSel.addEventListener('change', () => {
  scene.cancelSwap();
  swapping = false;
  plotActive = false;
  plotMs = 0;
  updateClock();
  updateControlLocks();
  sim.setLayerFilter(layerSel.value === 'all' ? null : +layerSel.value);
  scene.resetInk();
  playBtn.textContent = '▶ Plot';
});

// Build the layer list + the single-layer <select> after each load. Each
// layer row IS its pen's control strip: swatch, type, tip, ink %, Fresh.
const layerRows = [];
function buildLayerUI(data) {
  layerSel.innerHTML = '<option value=all>All layers</option>';
  layersDiv.innerHTML = '';
  layerRows.length = 0;
  data.layerInfo.forEach((l, i) => {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = l.name;
    layerSel.appendChild(opt);

    const row = document.createElement('div');
    row.className = 'layer-row';
    const sw = document.createElement('input');
    sw.type = 'color'; sw.title = 'Ink color';
    const name = document.createElement('span');
    name.className = 'layer-name';
    name.textContent = l.name;
    name.title = l.name;
    const typeSel = document.createElement('select');
    typeSel.title = 'Pen type';
    for (const s of PEN_STYLES) {
      const o = document.createElement('option');
      o.value = s.style; o.textContent = s.label;
      typeSel.appendChild(o);
    }
    const tipSel = document.createElement('select');
    tipSel.title = 'Tip size (mm)';
    for (const t of TIP_SIZES) {
      const o = document.createElement('option');
      o.value = String(t); o.textContent = t.toFixed(1);
      tipSel.appendChild(o);
    }
    const ink = document.createElement('span');
    ink.className = 'pen-ink';
    const fresh = document.createElement('button');
    fresh.className = 'fresh-btn';
    fresh.textContent = 'Fresh';
    fresh.title = 'Swap in a fresh pen';
    row.append(sw, name, typeSel, tipSel, ink, fresh);
    layersDiv.appendChild(row);
    layerRows.push({ row, sw, typeSel, tipSel, ink, fresh });

    row.addEventListener('click', () => selectLayer(i));
    sw.addEventListener('input', () => {
      if (penLocked()) return;
      const id = layerPens[i];
      penState[id].color = sw.value;
      persistPens();
      layerPens.forEach((pid, j) => {   // layers sharing this pen follow it
        if (pid === id) sim.layerInfo[j].color = penColor(pid);
      });
      if (id === activePenId) refreshCarriage();   // recolored while paused
      refreshPanel();
    });
    typeSel.addEventListener('change', () => {
      if (penLocked()) { refreshPanel(); return; }
      // Switching type keeps the color intent: nearest pen of the new style.
      assignPen(i, closestPenOfStyle(typeSel.value, penColor(layerPens[i])));
      selectLayer(i);
    });
    tipSel.addEventListener('change', () => {
      if (penLocked()) { refreshPanel(); return; }
      const id = layerPens[i];
      const t = parseFloat(tipSel.value);
      if (t === penDef(id).tip) delete penState[id].tip;
      else penState[id].tip = t;
      persistPens();
      applyTip(effDef(id), id);
      if (id === activePenId) refreshCarriage();   // re-girthed while paused
      refreshPanel();
    });
    fresh.addEventListener('click', () => {
      if (penLocked() || !settings.inkSim) return;
      penSimFor(layerPens[i]).refill();
      syncPen(layerPens[i]);
      refreshPanel();
    });
  });
  layerSel.disabled = data.layerInfo.length < 2;
  selectedLayer = 0;
  refreshPanel();
}

paperColor.addEventListener('input', (e) => {
  if (paperLocked()) return;
  paperSel.color = e.target.value;
  applyPaper();
});

paperTypeSel.addEventListener('change', () => {
  if (paperLocked()) { refreshPanel(); return; }
  paperSel = { ...paperSel, id: paperTypeSel.value, color: null };
  scene.setPaperSelected(paperSel.id);
  applyPaper();
  refreshPanel();
});
paperSizeSel.addEventListener('change', () => {
  if (paperLocked()) { refreshPanel(); return; }
  paperSel.size = paperSizeSel.value;
  try { localStorage.setItem(PAPER_KEY, JSON.stringify(paperSel)); } catch {}
  // Changing the sheet rebuilds the whole rig: tear the plot down cleanly.
  scene.cancelSwap();
  swapping = false;
  plotActive = false;
  plotMs = 0;
  updateClock();
  if (activePenId) { syncPen(activePenId); activePenId = null; }
  currentLayer = null;
  sim.reset();
  applyPaperSize();
  playBtn.textContent = '▶ Plot';
  updateControlLocks();
  refreshPanel();
});
inkSimBox.addEventListener('change', () => {
  settings.inkSim = inkSimBox.checked;
  persistSettings();
  for (const id in penSims) penSims[id].realistic = settings.inkSim;
  updateControlLocks();   // Fresh buttons follow the toggle
  refreshPanel();
});

// Startup sync, deferred to here: selectedPenId/refreshPanel are declared
// with let/function further down than the earlier startup block (around
// scene.buildInventory above), so this call has to run after their declarations.
scene.setPenSelected(selectedPenId);
refreshPanel();

let last = performance.now();
function loop(now) {
  const dt = Math.min(now - last, 100);   // clamp to avoid post-blur jumps
  last = now;
  if (sim.running) {
    plotMs += dt * speed;   // simulated plot time, not wall time
    updateClock();
    const px = penX, py = penY;
    sim.tick(dt * speed);
    if (pendingSwap) {
      const { def, col } = pendingSwap; pendingSwap = null;
      swapping = true;
      scene.swapPen(def, col, () => { swapping = false; sim.start(); });
    }
    if (speed === 1) {
      // Net per-axis movement this frame -> mm/s drives the motor whine.
      const dtSec = Math.max(dt, 1) / 1000;
      audio.updateMotors(Math.abs(penX - px) / dtSec, Math.abs(penY - py) / dtSec);
    } else {
      audio.silence();
    }
  } else {
    audio.silence();
  }
  scene.render(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
