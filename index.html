<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8>
<title>Plotter3D</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
  #stage { position: fixed; inset: 0; }
  #panel { position: fixed; top: 12px; left: 12px; padding: 10px 12px;
    background: rgba(255,255,255,0.92); border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15); font-size: 13px; }
  #panel button { padding: 5px 12px; font-size: 13px; cursor: pointer; margin-right: 6px; }
  #hint { color: #555; }
#panel .row { margin-bottom: 8px; display: flex; gap: 10px; align-items: center; }
#panel label { display: flex; gap: 4px; align-items: center; color: #555; }
#layers { display: flex; flex-direction: column; gap: 4px; max-width: 220px; }
.layer-row { display: flex; align-items: center; gap: 6px; cursor: pointer; border-radius: 4px; padding: 1px 3px; }
.layer-row.sel { background: #e3ecf7; }
.dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 1px solid #0002; }
.layer-name { color: #333; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pen-name { color: #555; font-size: 11px; margin-left: auto; white-space: nowrap; }
#penInfo input[type=color], #paperColor { width: 18px; height: 18px; padding: 0; border: 1px solid #ccc; background: none; cursor: pointer; }
#recent { margin-top: 10px; display: none; }
.recent-head { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #888; margin-bottom: 4px; }
.recent-item { display: block; width: 100%; max-width: 220px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 3px 6px; margin: 2px 0; font-size: 12px; cursor: pointer; background: #f3f5f7; border: 1px solid #dde2e6; border-radius: 4px; }
.recent-item:hover { background: #e7ebef; }
body.ui-hidden #panel { display: none; }
#tip { position: fixed; background: rgba(20,22,26,0.9); color: #fff; padding: 4px 8px;
  border-radius: 4px; font-size: 11px; pointer-events: none; display: none; z-index: 10; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id=stage></div>
<div id=panel>
  <div id=hint>Drop an SVG file anywhere to load it onto the plotter</div>
  <div id=controls style="display:none">
    <div class=row>
      <button id=playBtn>▶ Plot</button>
      <button id=resetBtn>Reset</button>
      <button id=muteBtn title="Mute / unmute sound">🔊</button>
    </div>
    <div class=row>
      <label>Speed
        <select id=speedSel>
          <option value=1 selected>1×</option>
          <option value=5>5×</option>
          <option value=20>20×</option>
          <option value=100>100×</option>
          <option value=1000>1000×</option>
        </select>
      </label>
      <label>Plot
        <select id=layerSel><option value=all>All layers</option></select>
      </label>
    </div>
    <div id=layers></div>
    <div class=row id=penInfo style="display:none">
      <span id=penInfoDot class=dot></span>
      <span id=penInfoName class=layer-name></span>
      <span id=penInfoInk style="color:#888"></span>
      <input type=color id=penInkColor title="Override ink color">
      <button id=penReplace title="Swap in a fresh pen">Fresh</button>
    </div>
    <div class=row>
      <label>Paper <span id=paperName></span>
        <input type=color id=paperColor title="Override paper color">
      </label>
    </div>
  </div>
  <div id=recent></div>
</div>
<div id=tip></div>

<script type="module">
import { createScene } from './code/scene.js';
import { extractStrokes } from './code/plotExtract.js';
import { PlotSim } from './code/sim.js';
import { createAudio } from './code/audio.js';
import { SAMPLE_SVG } from './code/sample.js';
import { PENS, PAPERS, DEFAULT_PEN, DEFAULT_PAPER } from './code/inventory.js';
import { PenSim, createRng } from './code/penSim.js';

const scene = createScene(document.getElementById('stage'));
const sim = new PlotSim();
const audio = createAudio();
const hint = document.getElementById('hint');
const controls = document.getElementById('controls');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');

let speed = 1;   // sim time multiplier (set by the Speed control)
let loaded = false;

// Pen position is tracked here so the animation loop can derive per-axis speed
// for the motor sounds; a pen up/down change triggers the servo blip.
let penX = 0, penY = 0, penDownPrev = false;
audio.setEnabled(speed === 1);   // sound only plays at realtime (1x)

// --- pens & paper ---------------------------------------------------------
// Pen ink levels (and ink-color overrides) persist across sessions: your
// half-dead Sharpie is still half-dead tomorrow. PenSim instances are the
// live source of truth; penState mirrors them for storage.
const PEN_KEY = 'plotter3d.pens';
const PAPER_KEY = 'plotter3d.paper';
try { localStorage.removeItem('plotter3d.penWidth'); } catch {}   // leftover key from a removed feature
const penDef = (id) => PENS.find(p => p.id === id) || PENS[0];

let penState = {};
try { penState = JSON.parse(localStorage.getItem(PEN_KEY)) || {}; } catch {}
for (const p of PENS) penState[p.id] = { ink: 1, ...penState[p.id] };
function persistPens() {
  try { localStorage.setItem(PEN_KEY, JSON.stringify(penState)); } catch {}
}
const penColor = (id) => penState[id].color || penDef(id).color;

const penSims = {};
function penSimFor(id) {
  if (!penSims[id]) penSims[id] = new PenSim(penDef(id),
    { ink: penState[id].ink, rng: createRng(1234) });
  return penSims[id];
}
function syncPen(id) {
  if (!penSims[id]) return;
  penState[id].ink = penSims[id].ink;
  persistPens();
  scene.setPenLevel(id, penState[id].ink);
}

let paperSel = { id: DEFAULT_PAPER, color: null };
try { paperSel = { ...paperSel, ...(JSON.parse(localStorage.getItem(PAPER_KEY)) || {}) }; } catch {}
const paperDef = () => PAPERS.find(p => p.id === paperSel.id) || PAPERS[0];
function applyPaper() {
  const d = paperDef();
  scene.setPaper({ color: paperSel.color || d.color, grain: d.grain, bleed: d.bleed });
  try { localStorage.setItem(PAPER_KEY, JSON.stringify(paperSel)); } catch {}
}
applyPaper();

scene.buildInventory(PENS, PAPERS);
scene.setPaperSelected(paperSel.id);
PENS.forEach(p => scene.setPenLevel(p.id, penState[p.id].ink));

const tip = document.getElementById('tip');
scene.onHover((u, x, y) => {
  if (!u) { tip.style.display = 'none'; return; }
  tip.style.display = '';
  tip.style.left = (x + 14) + 'px';
  tip.style.top = (y + 10) + 'px';
  tip.textContent = u.type === 'pen'
    ? `${penDef(u.id).name} · ${penDef(u.id).tip}mm · ink ${Math.round(penSimFor(u.id).ink * 100)}%`
    : PAPERS.find(p => p.id === u.id).name;
});
scene.onPick((u) => {
  if (plotLocked()) return;
  if (u.type === 'pen') selectPen(u.id);
  else { paperSel = { id: u.id, color: null }; scene.setPaperSelected(u.id); applyPaper(); refreshPanel(); }
});

// Initial layer assignment: the pen whose ink is nearest the SVG layer color,
// so a red Inkscape layer picks up the red fineliner automatically.
function closestPen(hex) {
  const v = parseInt((hex || '#000000').slice(1), 16);
  const r = v >> 16 & 255, g = v >> 8 & 255, b = v & 255;
  let best = DEFAULT_PEN, bd = Infinity;
  for (const p of PENS) {
    const w = parseInt(penColor(p.id).slice(1), 16);
    const d = (r - (w >> 16 & 255)) ** 2 + (g - (w >> 8 & 255)) ** 2 + (b - (w & 255)) ** 2;
    if (d < bd) { bd = d; best = p.id; }
  }
  return best;
}

let layerPens = [];          // pen id per layer index
let activePenId = null;      // pen currently in the machine
let pendingSwap = null;      // {def, col} set by onLayer, consumed by the rAF loop
const plotLocked = () => sim.running;

function assignPen(layerIdx, penId) {
  if (plotLocked()) return;
  layerPens[layerIdx] = penId;
  sim.layerInfo[layerIdx].color = penColor(penId);  // sim's color follows the pen
  buildLayerUI._refresh?.();
}

sim.onPose = (x, y, down) => {
  scene.setPenPose(x, y, down);
  penX = x; penY = y;
  if (down !== penDownPrev) {
    penDownPrev = down;
    const ps = activePenId && penSimFor(activePenId);
    if (ps) down ? ps.penDown() : ps.penUp();
    audio.penMove(down);
  }
};
sim.onLayer = (i) => {
  const id = layerPens[i] ?? DEFAULT_PEN;
  if (id === activePenId) return;
  const prev = activePenId;
  if (prev) { syncPen(prev); scene.setPenInCaddy(prev, true); }
  activePenId = id;
  scene.setPenInCaddy(id, false);              // it's in the machine now
  const def = penDef(id), col = penColor(id);
  if (speed === 1 && sim.running && prev) {
    pendingSwap = { def, col };
    sim.pause();
    audio.penMove(false);                      // servo blip sells the swap
  } else {
    scene.setCarriagePen(def, col);
  }
};
sim.onInk = (ax, ay, bx, by) => {
  const id = activePenId ?? DEFAULT_PEN;
  const def = penDef(id);
  for (const op of penSimFor(id).segment(ax, ay, bx, by))
    scene.drawOp({ ...op, color: penColor(id), sheen: def.sheen });
};
sim.onComplete = () => {
  playBtn.textContent = '▶ Plot';
  setSwatchesEnabled(true);
  if (activePenId) syncPen(activePenId);
  if (activePenId) { scene.setPenInCaddy(activePenId, true); activePenId = null; }
};

function loadSvgText(text, name) {
  let data;
  try { data = extractStrokes(text); }
  catch (e) { hint.textContent = 'Could not parse that SVG.'; hint.style.display = ''; return; }
  if (!data.strokes.length) { hint.textContent = 'No strokes found in that SVG.'; hint.style.display = ''; return; }
  scene.loadArtwork(data.widthMm, data.heightMm);
  sim.load(data.strokes, data.strokeLayers, data.layerInfo,
           { downSpeed: 60, upSpeed: 200, liftMs: 240 });
  layerPens = data.layerInfo.map(l => closestPen(l.color));
  data.layerInfo.forEach((l, i) => { l.color = penColor(layerPens[i]); });
  scene.cancelSwap();
  if (activePenId) { syncPen(activePenId); scene.setPenInCaddy(activePenId, true); }
  activePenId = null;
  loaded = true;
  hint.style.display = 'none';
  controls.style.display = '';
  playBtn.textContent = '▶ Plot';
  layerSel.value = 'all';
  sim.setLayerFilter(null);
  buildLayerUI(data);
  saveRecent(name, text);
}

// --- recently plotted files ---
// `recentList` is the in-memory source of truth so the list always renders this
// session even if localStorage is unavailable (e.g. some file:// setups) or a
// write fails; localStorage is just best-effort persistence across reloads.
const RECENT_KEY = 'plotter3d.recent';
const MAX_RECENT = 8;
const recentDiv = document.getElementById('recent');

function readStored() {
  try { const v = JSON.parse(localStorage.getItem(RECENT_KEY)); return Array.isArray(v) ? v : []; }
  catch { return []; }
}
let recentList = readStored();
// First visit (nothing stored yet): seed the list with a built-in sample so
// there's something to click. Loading it persists it like any dropped file.
if (!recentList.length) recentList = [{ name: 'sample.svg', svg: SAMPLE_SVG, t: 0 }];

function persistRecent() {
  let l = recentList.slice();
  while (l.length) {
    try { localStorage.setItem(RECENT_KEY, JSON.stringify(l)); return; }
    catch { l.pop(); }            // quota/blocked: shrink and retry
  }
  try { localStorage.removeItem(RECENT_KEY); } catch {}
}

function saveRecent(name, svg) {
  if (!svg) return;
  const n = name || 'untitled.svg';
  recentList = [{ name: n, svg, t: Date.now() },
                ...recentList.filter(it => it.name !== n)].slice(0, MAX_RECENT);
  persistRecent();                 // best-effort; UI renders from recentList
  buildRecentUI();
}

function buildRecentUI() {
  recentDiv.innerHTML = '';
  if (!recentList.length) { recentDiv.style.display = 'none'; return; }
  recentDiv.style.display = 'block';
  const head = document.createElement('div');
  head.className = 'recent-head';
  head.textContent = 'Recent';
  recentDiv.appendChild(head);
  recentList.forEach(it => {
    const b = document.createElement('button');
    b.className = 'recent-item';
    b.textContent = it.name;
    b.title = it.name;
    b.addEventListener('click', () => loadSvgText(it.svg, it.name));
    recentDiv.appendChild(b);
  });
}
buildRecentUI();

// Press F to toggle a free-fly camera (documented in the README; no on-screen
// hint — the view stays clean). H hides/shows all the UI.
let uiHidden = false;
addEventListener('keydown', e => {
  const tag = e.target && e.target.tagName;   // don't hijack keys while a control is focused
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  const k = e.key.toLowerCase();
  if (k === 'f') { e.preventDefault(); scene.toggleFreeCam(); }
  else if (k === 'h') {
    e.preventDefault();
    uiHidden = !uiHidden;
    document.body.classList.toggle('ui-hidden', uiHidden);
  }
});

addEventListener('dragover', e => e.preventDefault());
addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = () => loadSvgText(r.result, file.name);
  r.readAsText(file);
});

playBtn.addEventListener('click', () => {
  if (!loaded) return;
  if (sim.running) {
    sim.pause();
    playBtn.textContent = '▶ Plot';
    if (activePenId) syncPen(activePenId);
  }
  else {
    if (sim.isComplete()) { sim.reset(); scene.resetInk(); }
    sim.start();
    audio.resume();              // user gesture — unlock Web Audio
    playBtn.textContent = '❚❚ Pause';
    setSwatchesEnabled(false);   // pen colors are locked once a plot is running
  }
});
resetBtn.addEventListener('click', () => {
  scene.cancelSwap();
  sim.reset();
  scene.resetInk();
  playBtn.textContent = '▶ Plot';
  setSwatchesEnabled(true);
  if (activePenId) { scene.setPenInCaddy(activePenId, true); activePenId = null; }
});

// Sound on/off toggle (persisted). This is independent of the realtime gate,
// so audio still only plays at 1x AND when un-muted.
const muteBtn = document.getElementById('muteBtn');
let muted = false;
try { muted = localStorage.getItem('plotter3d.muted') === '1'; } catch {}
function applyMute() {
  audio.setMuted(muted);
  muteBtn.textContent = muted ? '🔇' : '🔊';
}
applyMute();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  try { localStorage.setItem('plotter3d.muted', muted ? '1' : '0'); } catch {}
  applyMute();
});

const speedSel = document.getElementById('speedSel');
const layerSel = document.getElementById('layerSel');
const layersDiv = document.getElementById('layers');

let selectedLayer = 0;
let selectedPenId = null;
const penInfo = document.getElementById('penInfo');
const paperColor = document.getElementById('paperColor');
const paperName = document.getElementById('paperName');

function setSwatchesEnabled(on) {   // name kept: same lock, wider scope
  document.getElementById('penInkColor').disabled = !on;
  document.getElementById('penReplace').disabled = !on;
  paperColor.disabled = !on;
}

function selectLayer(i) {
  selectedLayer = i;
  refreshPanel();
}

function selectPen(id) {
  selectedPenId = id;
  if (selectedLayer != null && !plotLocked()) assignPen(selectedLayer, id);
  refreshPanel();
}

function refreshPanel() {
  layersDiv.querySelectorAll('.layer-row').forEach((row, i) => {
    row.classList.toggle('sel', i === selectedLayer);
    row.querySelector('.dot').style.background = penColor(layerPens[i]);
    row.querySelector('.pen-name').textContent = penDef(layerPens[i]).name;
  });
  if (selectedPenId) {
    penInfo.style.display = '';
    document.getElementById('penInfoDot').style.background = penColor(selectedPenId);
    document.getElementById('penInfoName').textContent = penDef(selectedPenId).name;
    document.getElementById('penInfoInk').textContent =
      Math.round(penSimFor(selectedPenId).ink * 100) + '%';
    document.getElementById('penInkColor').value = penColor(selectedPenId);
  } else penInfo.style.display = 'none';
  paperName.textContent = paperDef().name;
  paperColor.value = paperSel.color || paperDef().color;
}
buildLayerUI._refresh = refreshPanel;

speedSel.addEventListener('change', () => {
  speed = +speedSel.value;
  audio.setEnabled(speed === 1);   // mute above realtime
});

layerSel.addEventListener('change', () => {
  scene.cancelSwap();
  sim.setLayerFilter(layerSel.value === 'all' ? null : +layerSel.value);
  scene.resetInk();
  playBtn.textContent = '▶ Plot';
});

// Build the layer list + the single-layer <select> after each load.
function buildLayerUI(data) {
  layerSel.innerHTML = '<option value=all>All layers</option>';
  layersDiv.innerHTML = '';
  data.layerInfo.forEach((l, i) => {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = l.name;
    layerSel.appendChild(opt);

    const row = document.createElement('div');
    row.className = 'layer-row';
    row.innerHTML = `<span class=dot></span><span class=layer-name></span><span class=pen-name></span>`;
    row.querySelector('.layer-name').textContent = l.name;
    row.addEventListener('click', () => selectLayer(i));
    layersDiv.appendChild(row);
  });
  layerSel.disabled = data.layerInfo.length < 2;
  selectedLayer = 0;
  refreshPanel();
}

document.getElementById('penInkColor').addEventListener('input', (e) => {
  if (!selectedPenId) return;
  penState[selectedPenId].color = e.target.value;
  persistPens();
  layerPens.forEach((id, i) => {      // layers holding this pen follow it
    if (id === selectedPenId) sim.layerInfo[i].color = penColor(id);
  });
  refreshPanel();
});
document.getElementById('penReplace').addEventListener('click', () => {
  if (!selectedPenId || plotLocked()) return;
  penSimFor(selectedPenId).refill();
  syncPen(selectedPenId);
  refreshPanel();
});
paperColor.addEventListener('input', (e) => {
  if (plotLocked()) return;
  paperSel.color = e.target.value;
  applyPaper();
});

let last = performance.now();
function loop(now) {
  const dt = Math.min(now - last, 100);   // clamp to avoid post-blur jumps
  last = now;
  if (sim.running) {
    const px = penX, py = penY;
    sim.tick(dt * speed);
    if (pendingSwap) {
      const { def, col } = pendingSwap; pendingSwap = null;
      scene.swapPen(def, col, () => sim.start());
    }
    if (speed === 1) {
      // Net per-axis movement this frame -> mm/s drives the motor whine.
      const dtSec = Math.max(dt, 1) / 1000;
      audio.updateMotors(Math.abs(penX - px) / dtSec, Math.abs(penY - py) / dtSec);
    } else {
      audio.silence();
    }
  } else {
    audio.silence();
  }
  scene.render(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
